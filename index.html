<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fonts sin bloquear el primer render: media="print" difiere la aplicación
         del stylesheet hasta que cargue; display=swap evita texto invisible. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <title>RF FIT</title>
    <style>
      /* Spinner del shell: visible mientras baja/parsea el bundle (mobile lento).
         React lo reemplaza al montar. Neutro a propósito: el tema se aplica después. */
      #root:empty::after {
        content: '';
        position: fixed;
        top: 50%;
        left: 50%;
        width: 2rem;
        height: 2rem;
        margin: -1rem 0 0 -1rem;
        border: 3px solid #e4e4e7;
        border-top-color: #a1a1aa;
        border-radius: 9999px;
        animation: shell-spin 0.8s linear infinite;
      }
      @keyframes shell-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
